services:
  postgres:
    image: postgres:16
    container_name: plantyhub-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plantyhub
    volumes:
      - plantyhub_pgdata:/var/lib/postgresql/data

volumes:
  plantyhub_pgdata:
